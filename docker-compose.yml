services:
  app:
    build: .
    ports:
      - "127.0.0.1:3004:3000"
    env_file: .env
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      OAUTH_REDIRECT_URL: http://localhost:3004/auth/google/callback

      # Inside containers, "localhost" points at the container itself.
      # Use a separate URL that targets the Postgres service on the compose network.
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://axene_templates:${POSTGRES_PASSWORD:-axene_templates_dev}@postgres:5432/axene_templates}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: axene_templates
      POSTGRES_USER: axene_templates
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axene_templates_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5436:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axene_templates -d axene_templates"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
